    padding:10px;

<body>

<div class="container">
<h1>📝 استبيان الحرارة - طور سيناء</h1>

<form id="form">

<div class="section">
<h3>الفئة العمرية</h3>
<label><input type="radio" name="age" value="أقل من 15"> أقل من 15</label>
<label><input type="radio" name="age" value="15-25"> 15–25</label>
<label><input type="radio" name="age" value="26-40"> 26–40</label>
<label><input type="radio" name="age" value="أكثر من 40"> أكثر من 40</label>
</div>

<div class="section">
<h3>محل الإقامة</h3>
<input name="location" type="text">
</div>

<div class="section">
<h3>الإحساس بالحرارة</h3>
<label><input type="radio" name="heat" value="دائمًا"> دائمًا</label>
<label><input type="radio" name="heat" value="أحيانًا"> أحيانًا</label>
<label><input type="radio" name="heat" value="نادرًا"> نادرًا</label>
</div>

<div class="section">
<h3>وقت الحرارة</h3>
<label><input type="radio" name="time" value="الصباح"> الصباح</label>
<label><input type="radio" name="time" value="الظهر"> الظهر</label>
<label><input type="radio" name="time" value="العصر"> العصر</label>
<label><input type="radio" name="time" value="الليل"> الليل</label>
</div>

<div class="section">
<h3>تأثير الحرارة</h3>
<label><input type="radio" name="effect" value="كثيرًا"> كثيرًا</label>
<label><input type="radio" name="effect" value="قليلًا"> قليلًا</label>
<label><input type="radio" name="effect" value="لا تؤثر"> لا تؤثر</label>
</div>

<div class="section">
<h3>حلول</h3>
<label><input type="checkbox" name="green"> خضرة</label>
<label><input type="checkbox" name="reflect"> عواكس</label>
<label><input type="checkbox" name="vent"> تهوية</label>
<label><input type="checkbox" name="cement"> تقليل الخرسانة</label>
</div>

<div class="section">
<h3>رأي شخصي</h3>
<textarea name="opinion"></textarea>
</div>

<button type="submit">إرسال</button>

</form>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
e.preventDefault();

let formData = new FormData(this);

fetch("https://script.google.com/macros/s/AKfycbxUjCCjKFJr3L1RoaUi19f_-bPx6ZjiztlDBs_soieEx0-Rvll8-0jqY3S32IvQ_R64/exec", {
method: "POST",
body: formData
})
.then(res => alert("تم الإرسال بنجاح ✅"))
.catch(err => alert("حصل خطأ"));
});
</script>

</body>
